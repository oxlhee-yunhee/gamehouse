services:
  db:
    image: postgres:16-alpine
    container_name: duo-db
    environment:
      POSTGRES_DB: duo
      POSTGRES_USER: duo
      POSTGRES_PASSWORD: duo1234
    ports:
      - "5432:5432"
    volumes:
      - duo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duo"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  duo-db-data:
